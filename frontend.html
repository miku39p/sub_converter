<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subconverter - 极简订阅转换</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-dim);
        }

        textarea, select, input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus, select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        .result-area {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--glass-border);
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #resultUrl {
            min-height: 80px;
            font-family: monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            word-break: break-all;
            background: rgba(0, 0, 0, 0.4);
        }

        .copy-actions {
            display: flex;
            gap: 12px;
        }

        .copy-btn {
            background: var(--glass-border);
            flex: 1;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        select option {
            background: #1e1b4b;
            color: white;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
            .container { padding: 24px; }
        }
    </style>
</head>

    <script>
        // 自动获取当前部署的 Worker 域名作为后端地址
        const BACKEND_URL = window.location.origin;

        function handleTargetChange() {
            const target = document.getElementById('target').value;
            const appendYamlGroup = document.getElementById('appendYamlGroup');
            if (target === 'clash') {
                appendYamlGroup.style.display = 'block';
            } else {
                appendYamlGroup.style.display = 'none';
            }
        }
        
        // 初始化显示状态
        document.addEventListener('DOMContentLoaded', () => {
            handleTargetChange();
        });

        function generate() {
            const links = document.getElementById('links').value.trim().split('\n').filter(l => l.trim());
            const target = document.getElementById('target').value;
            
            // 优先使用自定义配置，如果没有则使用下拉框
            const customConfig = document.getElementById('customConfig').value.trim();
            const selectedConfig = document.getElementById('remoteConfig').value;
            const config = customConfig || selectedConfig;

            if (links.length === 0) {
                alert('请输入订阅链接');
                return;
            }

            const filename = document.getElementById('filename').value.trim();
            
            const appendYaml = document.getElementById('appendYaml').value.trim();
            const appendYamlParam = (target === 'clash' && appendYaml) ? `&append_yaml=${encodeURIComponent(appendYaml)}` : '';

            // 固定参数
            const fixedParams = 'tls13=true&emoji=true&list=false&xudp=true&udp=true&tfo=false&expand=true&scv=false&fdn=false&new_name=true&diyua=ShadowRocket';

            // 按照用户要求的格式生成：后端 + /sub?target=...&url=...&config=...&固定参数&filename=...
            const longUrl = `${BACKEND_URL}/sub?target=${target}&url=${encodeURIComponent(links.join('|'))}${config ? '&config=' + encodeURIComponent(config) : ''}&${fixedParams}${filename ? '&filename=' + encodeURIComponent(filename) : ''}${appendYamlParam}`;
            
            const resultUrl = document.getElementById('resultUrl');
            resultUrl.value = longUrl;
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('shortBtn').style.display = 'flex';
            
            // 自动滚动到结果区域
            document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
        }

        async function shorten() {
            const longUrl = document.getElementById('resultUrl').value;
            const shortBtn = document.getElementById('shortBtn');
            const originalText = shortBtn.innerHTML;
            
            shortBtn.disabled = true;
            shortBtn.textContent = '生成中...';

            try {
                // 如果在本地测试，可能需要指向完整的后端地址
                const res = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: longUrl })
                });
                
                if (!res.ok) throw new Error('Shorten service returned ' + res.status);
                
                const data = await res.json();
                document.getElementById('resultUrl').value = data.shortUrl;
                alert('短链接已生成！（注：短链接有效期为 20 分钟，到期后将自动删除）');
                shortBtn.style.display = 'none';
            } catch (e) {
                console.error(e);
                alert('生成失败: ' + e.message);
            } finally {
                shortBtn.disabled = false;
                shortBtn.innerHTML = originalText;
            }
        }

        function copyUrl() {
            const input = document.getElementById('resultUrl');
            input.select();
            document.execCommand('copy');
            
            const btn = document.querySelector('.copy-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span>已复制!</span>';
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 2000);
        }
    </script>
</body>
</html>
